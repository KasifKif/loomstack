<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Weaver{% endblock %} — Loomstack</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <nav id="sidebar">
    <div class="brand">Weaver</div>
    <ul>
      <li><a href="/"       {% if active == "dashboard" %}class="active"{% endif %}>Dashboard</a></li>
      <li><a href="/chat"   {% if active == "chat"      %}class="active"{% endif %}>Chat</a></li>
      <li><a href="/tasks"  {% if active == "tasks"     %}class="active"{% endif %}>Tasks</a></li>
      <li><a href="/budget" {% if active == "budget"    %}class="active"{% endif %}>Budget</a></li>
      <li><a href="/health"     {% if active == "health"    %}class="active"{% endif %}>Health</a></li>
      <li><a href="/providers" {% if active == "providers" %}class="active"{% endif %}>Providers</a></li>
      <li><a href="/workers"   {% if active == "workers"   %}class="active"{% endif %}>Workers</a></li>
    </ul>
    <div class="nav-section-label">Projects</div>
    <ul>
      {% set nav_projects = weaver_projects() %}
      <li><a href="/projects" {% if active == "projects"  %}class="active"{% endif %}>Projects</a></li>
      {% for p in nav_projects %}
      <li><a href="/projects/{{ p }}" {% if active_project == p %}class="active"{% endif %}>{{ p }}</a></li>
      {% endfor %}
    </ul>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
